name: daily-refresh
on:
  schedule:
    - cron: "0 22 * * 1-5"   # weekdays 22:00 UTC (after US market close)
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: python scripts/refresh_data.py
        env:
          OCDVM_UA: "OCDVM research meng.xiao@nus.edu.sg"
      - name: commit refreshed data
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add data/raw outputs site || true
          git commit -m "chore: daily data refresh" || echo "no changes"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: refresh
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
