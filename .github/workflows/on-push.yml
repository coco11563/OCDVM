name: on-push-rebuild
on:
  push:
    paths:
      - "inputs/**"
      - "config/**"
      - "ocdvm/**"
      - "report/**"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: run model on newest inputs
        run: |
          latest=$(ls inputs/2*.yaml 2>/dev/null | sort | tail -1)
          if [ -n "$latest" ]; then python run.py --inputs "$latest"; else echo "no quarter inputs"; fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
