  agent_note: >
    July 2026 context: ORCL is ~58% off its Sept-2025 high and down ~28% YTD. The market is
    not doubting OCI's demand — RPO of $638B is the largest booked backlog in enterprise
    software — it is repricing the cost of delivering it: $55.7B annual CapEx, ~$98B net debt,
    and OCI still cash-flow negative. Concentration is the swing risk (a handful of large AI
    contracts, OpenAI-heavy), which is why the quality factor Q is held near neutral despite
    Oracle's database moat. The thesis: today OCI is correctly a Neo-cloud (EV/Sales) asset;
    the re-rating to hyperscaler pricing begins only when CapEx growth decelerates toward
    revenue growth (CEI toward 1.0) and an OCI operating margin becomes visible.
